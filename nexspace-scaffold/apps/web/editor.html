<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexSpace — Floor Editor</title>
<style>
  :root{--bg:#0e1320;--panel:#161d2e;--panel2:#1e2740;--line:#2b3654;--text:#e8edf7;--muted:#8a96b3;--accent:#5b8cff;--accent2:#39d3a6;--warn:#ffb454;--danger:#ff5d6c}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden;user-select:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #c{position:fixed;inset:0;display:block;background:#0b1019;cursor:default}
  #bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:96vw;
    background:rgba(22,29,46,.94);border:1px solid var(--line);border-radius:14px;padding:8px 12px;z-index:20;backdrop-filter:blur(8px)}
  .brand{font-weight:700;display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .sep{width:1px;height:22px;background:var(--line)}
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:7px 11px;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:#fff}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:#7aa2ff}
  .btn.warn{border-color:var(--danger);color:#ffd2d7}
  .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-right:2px}
  #status{position:fixed;bottom:14px;left:14px;z-index:15;font-size:12px;color:var(--muted);background:rgba(22,29,46,.85);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  #hint{position:fixed;bottom:14px;right:14px;z-index:15;font-size:12px;color:var(--muted);background:rgba(22,29,46,.85);border:1px solid var(--line);border-radius:10px;padding:8px 12px;line-height:1.6;max-width:42vw}
  kbd{background:var(--panel2);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;color:var(--text)}
  #toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(22,29,46,.96);border:1px solid var(--line);border-radius:10px;padding:9px 15px;font-size:13px;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bar">
  <span class="brand"><span class="dot"></span>NexSpace · Floor Editor</span>
  <span class="sep"></span>
  <span class="lbl">Add</span>
  <button class="btn" data-add="table">＋ Table</button>
  <button class="btn" data-add="desk">＋ Desk</button>
  <button class="btn" data-add="couch">＋ Couch</button>
  <button class="btn" data-add="plant">＋ Plant</button>
  <span class="sep"></span>
  <button class="btn warn" id="del">🗑 Delete</button>
  <button class="btn" id="reload">↻ Reload</button>
  <button class="btn primary" id="save">💾 Save to API</button>
</div>
<div id="status">Loading…</div>
<div id="hint">Click furniture to select · <b>drag</b> to move (snaps to grid) · drag a room to move it · <kbd>Del</kbd> removes · <b>Save</b> writes to Postgres via the API.</div>
<div id="toast"></div>

<script>
"use strict";
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const API_BASE=location.protocol+'//'+location.hostname+':3001';
  let DPR=Math.max(1,Math.min(2,devicePixelRatio||1)),VW=0,VH=0;
  function resize(){VW=innerWidth;VH=innerHeight;cv.width=VW*DPR;cv.height=VH*DPR;cv.style.width=VW+'px';cv.style.height=VH+'px';ctx.setTransform(DPR,0,0,DPR,0,0);fit();}
  addEventListener('resize',resize);

  let WORLD={w:2200,h:1500},rooms=[],objects=[],dirty=false;
  let scale=1,offx=0,offy=0;
  function fit(){scale=Math.min((VW*0.92)/WORLD.w,(VH*0.78)/WORLD.h);offx=(VW-WORLD.w*scale)/2;offy=(VH-WORLD.h*scale)/2+10;}
  const toW=(sx,sy)=>({x:(sx-offx)/scale,y:(sy-offy)/scale});
  const snap=v=>Math.round(v/10)*10;
  const hsl=h=>'hsl('+h+' 70% 60%)';
  function hexA(hex,a){const h=(hex||'#888888').replace('#','');return'rgba('+parseInt(h.substr(0,2),16)+','+parseInt(h.substr(2,2),16)+','+parseInt(h.substr(4,2),16)+','+a+')';}
  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2400);}
  function setStatus(){document.getElementById('status').textContent=
    objects.length+' objects · '+rooms.length+' rooms'+(dirty?' · unsaved changes':' · saved');}

  // ---------- Load ----------
  async function load(){
    try{const r=await fetch(API_BASE+'/floors/default');if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();
      WORLD={w:d.width,h:d.height};rooms=d.rooms.map(x=>({...x}));objects=d.objects.map(o=>({...o,config:o.config||{}}));
      dirty=false;fit();setStatus();toast('Loaded floor "'+(d.slug||'default')+'" from API');}
    catch(e){document.getElementById('status').textContent='Could not reach API at '+API_BASE+' — start apps/api (see its README).';}
  }

  // ---------- Geometry ----------
  const PRESETS={table:{w:160,h:90,r:12},desk:{w:120,h:60,r:8},couch:{w:160,h:70,r:18},plant:{w:60,h:60,r:30}};
  function objRect(o){const c=o.config||{};
    if(o.type==='mediaWall')return{x:o.x,y:o.y-(c.screenH||150),w:c.w||300,h:(c.screenH||150)+(c.base||16)};
    return{x:o.x,y:o.y,w:c.w||60,h:c.h||60};}
  function pick(wx,wy){
    for(let i=objects.length-1;i>=0;i--){const o=objects[i];if(o.type==='wall')continue;
      const r=objRect(o);if(wx>=r.x&&wx<=r.x+r.w&&wy>=r.y&&wy<=r.y+r.h)return{kind:'obj',obj:o};}
    for(const r of rooms){if(wx>=r.x&&wx<=r.x+r.w&&wy>=r.y&&wy<=r.y+r.h)return{kind:'room',room:r};}
    return null;
  }

  // ---------- Interaction ----------
  let sel=null,drag=null,pendingAdd=null;
  cv.addEventListener('mousedown',e=>{const w=toW(e.clientX,e.clientY);
    if(pendingAdd){const id='new-'+Date.now();objects.push({id,type:'furniture',x:snap(w.x-PRESETS[pendingAdd].w/2),y:snap(w.y-PRESETS[pendingAdd].h/2),z:0,rotation:0,scale:1,collidable:true,config:{...PRESETS[pendingAdd]}});
      sel=objects[objects.length-1];pendingAdd=null;cv.style.cursor='default';dirty=true;setStatus();return;}
    const hit=pick(w.x,w.y);sel=hit?(hit.kind==='obj'?hit.obj:hit.room):null;
    if(hit){const ox=hit.kind==='obj'?hit.obj.x:hit.room.x,oy=hit.kind==='obj'?hit.obj.y:hit.room.y;
      drag={...hit,ox:w.x-ox,oy:w.y-oy};cv.style.cursor='grabbing';}});
  addEventListener('mousemove',e=>{if(!drag)return;const w=toW(e.clientX,e.clientY);
    if(drag.kind==='obj'){drag.obj.x=snap(w.x-drag.ox);drag.obj.y=snap(w.y-drag.oy);}
    else{const nx=snap(w.x-drag.ox),ny=snap(w.y-drag.oy),dx=nx-drag.room.x,dy=ny-drag.room.y;
      drag.room.x=nx;drag.room.y=ny;drag.room.doorX+=dx;drag.room.doorY+=dy;}
    dirty=true;setStatus();});
  addEventListener('mouseup',()=>{if(drag){drag=null;cv.style.cursor='default';}});
  addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&sel&&sel.type&&sel.type!=='wall'){
    const i=objects.indexOf(sel);if(i>=0){objects.splice(i,1);sel=null;dirty=true;setStatus();toast('Deleted');}}});

  document.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',function(){pendingAdd=this.dataset.add;cv.style.cursor='crosshair';toast('Click the floor to place a '+pendingAdd);}));
  document.getElementById('del').addEventListener('click',()=>{if(sel&&sel.type&&sel.type!=='wall'){const i=objects.indexOf(sel);if(i>=0){objects.splice(i,1);sel=null;dirty=true;setStatus();}}});
  document.getElementById('reload').addEventListener('click',load);
  document.getElementById('save').addEventListener('click',async function(){
    const payload={objects:objects.map(o=>({type:o.type,x:o.x,y:o.y,z:o.z||0,rotation:o.rotation||0,scale:o.scale||1,collidable:o.collidable!==false,config:o.config||{}})),
      rooms:rooms.map(r=>({key:r.key,name:r.name,color:r.color,x:r.x,y:r.y,w:r.w,h:r.h,doorX:r.doorX,doorY:r.doorY,doorW:r.doorW,doorH:r.doorH,doorState:r.doorState,audioMode:r.audioMode}))};
    this.textContent='Saving…';
    try{const r=await fetch(API_BASE+'/floors/default/layout',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!r.ok)throw new Error('HTTP '+r.status);const res=await r.json();dirty=false;setStatus();toast('Saved '+res.objects+' objects to Postgres ✓ (restart realtime server to load)');}
    catch(e){toast('Save failed: '+e.message);}finally{this.textContent='💾 Save to API';}});

  // ---------- Render ----------
  function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function loop(){
    ctx.clearRect(0,0,VW,VH);ctx.fillStyle='#0b1019';ctx.fillRect(0,0,VW,VH);
    ctx.save();ctx.translate(offx,offy);ctx.scale(scale,scale);
    ctx.fillStyle='#141b2c';ctx.fillRect(0,0,WORLD.w,WORLD.h);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1/scale;
    for(let x=0;x<=WORLD.w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD.h);ctx.stroke();}
    for(let y=0;y<=WORLD.h;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD.w,y);ctx.stroke();}
    // rooms
    for(const r of rooms){ctx.fillStyle=hexA(r.color,.10);rr(r.x,r.y,r.w,r.h,18);ctx.fill();
      ctx.strokeStyle=hexA(r.color,sel===r?.95:.55);ctx.lineWidth=(sel===r?3:2)/scale;ctx.setLineDash([10,8]);rr(r.x,r.y,r.w,r.h,18);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=hexA(r.color,.9);ctx.font='600 18px sans-serif';ctx.textAlign='left';ctx.fillText(r.name,r.x+14,r.y+26);
      const st=r.doorState||'closed',dc=st==='open'?'#39d3a6':st==='locked'?'#ff5d6c':'#ffb454';
      ctx.fillStyle=hexA(dc,.7);rr(r.doorX,r.doorY,r.doorW,r.doorH,4);ctx.fill();}
    // objects
    for(const o of objects){const c=o.config||{};
      if(o.type==='wall'){ctx.fillStyle='#222c44';ctx.fillRect(o.x,o.y,c.w||10,c.h||10);continue;}
      if(o.type==='mediaWall'){const sy=o.y-(c.screenH||150);ctx.fillStyle='#222c44';ctx.fillRect(o.x,o.y,c.w||300,c.base||16);
        ctx.fillStyle='#0a0f1c';rr(o.x,sy,c.w||300,c.screenH||150,8);ctx.fill();ctx.strokeStyle=hexA('#5b8cff',sel===o?.95:.6);ctx.lineWidth=(sel===o?3:2)/scale;rr(o.x,sy,c.w||300,c.screenH||150,8);ctx.stroke();
        ctx.fillStyle='#9fb8ff';ctx.font='600 13px sans-serif';ctx.textAlign='center';ctx.fillText('📺 '+(c.title||'Media Wall'),o.x+(c.w||300)/2,sy+(c.screenH||150)/2);continue;}
      // furniture
      ctx.fillStyle=sel===o?'#34406b':'#2a3552';rr(o.x,o.y,c.w||60,c.h||60,c.r||10);ctx.fill();
      ctx.strokeStyle=sel===o?'#5b8cff':'rgba(255,255,255,.12)';ctx.lineWidth=(sel===o?3:1)/scale;rr(o.x,o.y,c.w||60,c.h||60,c.r||10);ctx.stroke();}
    ctx.restore();
    requestAnimationFrame(loop);
  }
  resize();load();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
