name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # lets you run it manually from the Actions tab

concurrency:           # a newer push cancels an in-progress run on the same ref
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexspace-scaffold
    env:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "nexspace-dev-secret-change-me"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # installs all workspaces (apps/* + packages/*) and the test harness (ws)
      - name: Install
        run: npm install

      # generate the Prisma client so the API type-check has its types
      - name: Prisma generate
        run: npx prisma generate --schema apps/api/prisma/schema.prisma

      # verify (syntax + tsc) and the realtime smoke test (RBAC, sync, reload, analytics)
      - name: Verify + smoke test
        run: npm run check

  redis-multinode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexspace-scaffold
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      REDIS_URL: "redis://localhost:6379"
      JWT_SECRET: "nexspace-dev-secret-change-me"
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      # two server instances + Redis: cross-node presence and event propagation
      - name: Multi-node Redis test
        run: npm run test:redis

  api-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexspace-scaffold
    env:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "nexspace-dev-secret-change-me"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Prisma generate
        run: npx prisma generate --schema apps/api/prisma/schema.prisma
      # boots the NestJS API and walks the mock SSO flow end-to-end
      - name: API SSO smoke test
        run: npm run test:api
